name: Build and Deploy Driver-Based FinOps Site

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Run model
        run: python main.py

      - name: Ensure docs/data folder exists
        run: mkdir -p docs/data

      - name: Copy output into docs
        run: cp output/unit_economics_report.json docs/data/unit_economics_report.json

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Debug docs folder
        run: |
          echo "Listing docs folder:"
          ls -R docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
