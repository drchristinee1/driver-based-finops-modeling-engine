name: Run Driver-Based FinOps Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run model
        run: |
          python main.py

      - name: Ensure docs data folder exists
        run: |
          mkdir -p docs/data

      - name: Copy output into docs
        run: |
          cp output/unit_economics_report.json docs/data/unit_economics_report.json

      - name: Commit updated report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/unit_economics_report.json
          git diff --staged --quiet || git commit -m "Update model output for GitHub Pages"
          git push
